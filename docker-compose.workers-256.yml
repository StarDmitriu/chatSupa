      CAMPAIGN_REPEAT_LEADER_TTL_MS: ${CAMPAIGN_REPEAT_LEADER_TTL_MS:-30000}
      CAMPAIGN_SEND_SHARD_COUNT: ${CAMPAIGN_SEND_SHARD_COUNT:-256}
      CAMPAIGN_SEND_MAX_SHARD_COUNT: ${CAMPAIGN_SEND_MAX_SHARD_COUNT:-256}
      CAMPAIGN_SEND_WORKER_SHARD_START: 128
      CAMPAIGN_SEND_WORKER_SHARD_END: 191
      CAMPAIGN_SEND_WORKER_LEGACY_DRAIN: "false"
      WA_SESSION_LEASE_TTL_MS: ${WA_SESSION_LEASE_TTL_MS:-45000}
      WA_SESSION_LEASE_RENEW_MS: ${WA_SESSION_LEASE_RENEW_MS:-15000}
      WA_SESSION_IDLE_RELEASE_MS: ${WA_SESSION_IDLE_RELEASE_MS:-300000}
      TG_SESSION_LEASE_TTL_MS: ${TG_SESSION_LEASE_TTL_MS:-45000}
      TG_SESSION_LEASE_RENEW_MS: ${TG_SESSION_LEASE_RENEW_MS:-15000}
      TG_SESSION_IDLE_RELEASE_MS: ${TG_SESSION_IDLE_RELEASE_MS:-300000}
