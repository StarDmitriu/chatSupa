# Nginx для развёртывания с PM2 (без Docker).
# Backend и frontend слушают на 127.0.0.1:3000 и 127.0.0.1:3001.
# Использование: скопировать в /etc/nginx/sites-available/ и включить сайт,
# либо заменить блоки proxy_pass в основном default.conf на эти.

server {
  listen 80;
  listen [::]:80;
  server_name chatrassylka.ru www.chatrassylka.ru;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name chatrassylka.ru www.chatrassylka.ru;

  ssl_certificate     /etc/letsencrypt/live/chatrassylka.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/chatrassylka.ru/privkey.pem;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  proxy_connect_timeout 60s;
  proxy_send_timeout 120s;
  proxy_read_timeout 120s;

  # API -> backend (PM2: localhost)
  location /api/ {
    if ($request_method = OPTIONS) {
      add_header 'Access-Control-Allow-Origin' "$http_origin" always;
      add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
      add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
      add_header 'Access-Control-Max-Age' 86400 always;
      return 204;
    }
    add_header 'Access-Control-Allow-Origin' "$http_origin" always;
    proxy_pass http://127.0.0.1:3000/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Frontend -> next (PM2: localhost)
  location / {
    proxy_pass http://127.0.0.1:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
