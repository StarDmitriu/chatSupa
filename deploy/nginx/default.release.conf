server {
  listen 80;
  listen [::]:80;
  server_name chatrassylka.ru www.chatrassylka.ru;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name chatrassylka.ru www.chatrassylka.ru;

  ssl_certificate /etc/letsencrypt/live/chatrassylka.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/chatrassylka.ru/privkey.pem;

  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  proxy_connect_timeout 60s;
  proxy_send_timeout 120s;
  proxy_read_timeout 120s;
  resolver 127.0.0.11 ipv6=off valid=10s;
  resolver_timeout 5s;

  location /api/ {
    if ($request_method = OPTIONS) {
      add_header 'Access-Control-Allow-Origin' "$http_origin" always;
      add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
      add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
      add_header 'Access-Control-Max-Age' 86400 always;
      return 204;
    }

    add_header 'Access-Control-Allow-Origin' "$http_origin" always;
    set $backend_upstream backend:3000;
    proxy_pass http://$backend_upstream/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location / {
    set $frontend_upstream frontend:3001;
    proxy_pass http://$frontend_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
