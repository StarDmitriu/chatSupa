server {
  listen 80;
  listen [::]:80;
  server_name chatrassylka.ru www.chatrassylka.ru;

  # Let's Encrypt challenge
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # редирект на https
  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name chatrassylka.ru www.chatrassylka.ru;

  ssl_certificate     /etc/letsencrypt/live/chatrassylka.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/chatrassylka.ru/privkey.pem;

  # чуть адекватнее настройки
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # таймауты прокси (504 при медленном upstream — холодный старт Next.js, нагрузка)
  proxy_connect_timeout 60s;
  proxy_send_timeout 120s;
  proxy_read_timeout 120s;

  # API -> backend
  location /api/ {
    proxy_pass http://backend:3000/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Frontend -> next
  location / {
    proxy_pass http://frontend:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
