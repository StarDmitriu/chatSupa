# Пример фрагмента для nginx (chatrassylka.ru / любой reverse-proxy к Next standalone).
# Важно: /_next/static/ — отдельный location с долгим кэшем; HTML — без долгого кэша.
#
# upstream (опционально):
# upstream next_frontend {
#   server 127.0.0.1:3001;
#   keepalive 32;
# }

# 1) Статика Next с хешами в имени файла — можно кэшировать годами
location /_next/static/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Не перезаписывать Cache-Control от Next, если он уже immutable; иначе раскомментируйте:
    # add_header Cache-Control "public, max-age=31536000, immutable" always;
}

# 2) Остальное (HTML, RSC, API routes) — не кэшировать долго у edge/CDN
location / {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Для HTML страницы приложение уже может отдавать no-store (см. src/proxy.ts).
    # На nginx можно дополнительно запретить долгий кэш у CDN:
    add_header Cache-Control "no-store" always;
}
