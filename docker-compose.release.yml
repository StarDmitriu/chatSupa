services:
  redis:
    image: redis:7-alpine
    container_name: chatrassylka_redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    cpus: "0.50"
    mem_limit: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: chatrassylka_backend
    env_file:
      - ./.env.prod
    environment:
      NODE_ENV: production
      PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      TELEGRAM_AUTOCONNECT: "false"
      CAMPAIGN_REPEAT_ENABLED: "true"
      DEFAULT_TZ: Europe/Moscow
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 15s
    cpus: "1.00"
    mem_limit: 1536m
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-/api}
    container_name: chatrassylka_frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-/api}
      BACKEND_INTERNAL_URL: http://backend:3000
      HOSTNAME: "0.0.0.0"
      NODE_OPTIONS: --enable-source-maps
      TURBOPACK: "0"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 15s
    cpus: "1.00"
    mem_limit: 768m
    shm_size: "256mb"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: chatrassylka_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/default.release.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 10s
    cpus: "0.50"
    mem_limit: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  redis_data:
