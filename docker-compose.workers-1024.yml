x-backend-worker-service: &backend-worker-service
  image: chatrassylka_backend_runtime:latest
  env_file:
    - ./.env.prod
  depends_on:
    redis:
      condition: service_healthy
  volumes:
    - wa_auth_data:/app/wa_auth
  restart: unless-stopped
  stop_grace_period: 45s
  cpus: "1.00"
  mem_limit: 2048m
  logging:
    driver: "json-file"
    options:
      max-size: "20m"
      max-file: "3"

x-worker-env: &worker-env
  NODE_ENV: production
  APP_RUNTIME_ROLE: worker
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_URL: redis://redis:6379
  TELEGRAM_AUTOCONNECT: "false"
  CAMPAIGN_REPEAT_ENABLED: "false"
  CAMPAIGN_REPEAT_LEADER_TTL_MS: ${CAMPAIGN_REPEAT_LEADER_TTL_MS:-30000}
  CAMPAIGN_SEND_SHARD_COUNT: "1024"
  CAMPAIGN_SEND_MAX_SHARD_COUNT: "1024"
  CAMPAIGN_SEND_WORKER_LEGACY_DRAIN: "false"
  CAMPAIGN_SEND_WORKER_MAX_UNPARTITIONED_SHARDS: ${CAMPAIGN_SEND_WORKER_MAX_UNPARTITIONED_SHARDS:-64}
  WA_SESSION_LEASE_TTL_MS: ${WA_SESSION_LEASE_TTL_MS:-45000}
  WA_SESSION_LEASE_RENEW_MS: ${WA_SESSION_LEASE_RENEW_MS:-15000}
  WA_SESSION_IDLE_RELEASE_MS: ${WA_SESSION_IDLE_RELEASE_MS:-300000}
  TG_SESSION_LEASE_TTL_MS: ${TG_SESSION_LEASE_TTL_MS:-45000}
  TG_SESSION_LEASE_RENEW_MS: ${TG_SESSION_LEASE_RENEW_MS:-15000}
  TG_SESSION_IDLE_RELEASE_MS: ${TG_SESSION_IDLE_RELEASE_MS:-300000}
  TG_AUTH_PENDING_IDLE_RELEASE_MS: ${TG_AUTH_PENDING_IDLE_RELEASE_MS:-900000}
  DEFAULT_TZ: Europe/Moscow

services:
  backend:
    environment:
      CAMPAIGN_SEND_SHARD_COUNT: "1024"
      CAMPAIGN_SEND_MAX_SHARD_COUNT: "1024"

  backend_scheduler:
    environment:
      CAMPAIGN_SEND_SHARD_COUNT: "1024"
      CAMPAIGN_SEND_MAX_SHARD_COUNT: "1024"

  backend_worker:
    cpus: "1.00"
    mem_limit: 2048m
    environment:
      SERVICE_INSTANCE_ID: worker-1
      CAMPAIGN_SEND_SHARD_COUNT: "1024"
      CAMPAIGN_SEND_MAX_SHARD_COUNT: "1024"
      CAMPAIGN_SEND_WORKER_SHARD_START: 0
      CAMPAIGN_SEND_WORKER_SHARD_END: 127
      CAMPAIGN_SEND_WORKER_LEGACY_DRAIN: "true"
      CAMPAIGN_SEND_WORKER_MAX_UNPARTITIONED_SHARDS: ${CAMPAIGN_SEND_WORKER_MAX_UNPARTITIONED_SHARDS:-64}

  backend_worker_2:
    <<: *backend-worker-service
    container_name: chatrassylka_backend_worker_2
    environment:
      <<: *worker-env
      SERVICE_INSTANCE_ID: worker-2
      CAMPAIGN_SEND_WORKER_SHARD_START: 128
      CAMPAIGN_SEND_WORKER_SHARD_END: 255

  backend_worker_3:
    <<: *backend-worker-service
    container_name: chatrassylka_backend_worker_3
    environment:
      <<: *worker-env
      SERVICE_INSTANCE_ID: worker-3
      CAMPAIGN_SEND_WORKER_SHARD_START: 256
      CAMPAIGN_SEND_WORKER_SHARD_END: 383

  backend_worker_4:
    <<: *backend-worker-service
    container_name: chatrassylka_backend_worker_4
    environment:
      <<: *worker-env
      SERVICE_INSTANCE_ID: worker-4
      CAMPAIGN_SEND_WORKER_SHARD_START: 384
      CAMPAIGN_SEND_WORKER_SHARD_END: 511

  backend_worker_5:
    <<: *backend-worker-service
    container_name: chatrassylka_backend_worker_5
    environment:
      <<: *worker-env
      SERVICE_INSTANCE_ID: worker-5
      CAMPAIGN_SEND_WORKER_SHARD_START: 512
      CAMPAIGN_SEND_WORKER_SHARD_END: 639

  backend_worker_6:
    <<: *backend-worker-service
    container_name: chatrassylka_backend_worker_6
    environment:
      <<: *worker-env
      SERVICE_INSTANCE_ID: worker-6
      CAMPAIGN_SEND_WORKER_SHARD_START: 640
      CAMPAIGN_SEND_WORKER_SHARD_END: 767

  backend_worker_7:
    <<: *backend-worker-service
    container_name: chatrassylka_backend_worker_7
    environment:
      <<: *worker-env
      SERVICE_INSTANCE_ID: worker-7
      CAMPAIGN_SEND_WORKER_SHARD_START: 768
      CAMPAIGN_SEND_WORKER_SHARD_END: 895

  backend_worker_8:
    <<: *backend-worker-service
    container_name: chatrassylka_backend_worker_8
    environment:
      <<: *worker-env
      SERVICE_INSTANCE_ID: worker-8
      CAMPAIGN_SEND_WORKER_SHARD_START: 896
      CAMPAIGN_SEND_WORKER_SHARD_END: 1023
